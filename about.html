  </p>

  <ul>
    <li>インストール不要ですぐ使える</li>
    <li>スマホでもPCでも利用可能</li>
    <li>データはブラウザ内に保存されるため安心</li>

  <p>
    金額・カテゴリ・メモを入力して追加するだけで、
