<h1>プライバシーポリシー</h1>

<p>
本Webアプリ（以下、「本アプリ」）では、ユーザーの個人情報を収集しません。
</p>

<h2>データの取り扱い</h2>
<p>
本アプリで入力されたデータは、すべてユーザーのブラウザ内（localStorage）に保存されます。  
外部サーバーへ送信されることはありません。
</p>

<h2>広告について</h2>
<p>
本アプリでは、今後Google AdSenseなどの第三者広告サービスを利用する場合があります。  
その際、Cookieを使用してユーザーの興味に応じた広告を表示することがあります。
</p>
