
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1rem 0;max-width:680px}
h2{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:1rem}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
.card-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.card-value{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.card-value.income{color:#1D9E75}
.card-value.expense{color:#E24B4A}
.card-value.balance{}
.form-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.form-row input,.form-row select{flex:1;min-width:100px;height:36px;padding:0 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px}
.form-row input:focus,.form-row select:focus{outline:none;box-shadow:0 0 0 2px var(--color-border-secondary)}
.btn{height:36px;padding:0 16px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;cursor:pointer;white-space:nowrap}
.btn:hover{background:var(--color-background-secondary)}
.btn-add{background:#1D9E75;color:#fff;border-color:#1D9E75}
.btn-add:hover{background:#0F6E56;border-color:#0F6E56}
.list-header{display:grid;grid-template-columns:90px 1fr 80px 90px 36px;gap:8px;padding:6px 8px;font-size:12px;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:4px}
.list-item{display:grid;grid-template-columns:90px 1fr 80px 90px 36px;gap:8px;align-items:center;padding:8px;border-radius:var(--border-radius-md);font-size:14px;margin-bottom:4px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary)}
.list-item:hover{background:var(--color-background-secondary)}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500}
.badge.income{background:#E1F5EE;color:#0F6E56}
.badge.expense{background:#FCEBEB;color:#A32D2D}
.amount.income{color:#1D9E75;font-weight:500}
.amount.expense{color:#E24B4A;font-weight:500}
.del-btn{width:28px;height:28px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.del-btn:hover{background:#FCEBEB;color:#E24B4A;border-color:#F09595}
.empty{text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:14px}
.filter-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.filter-btn{height:30px;padding:0 12px;border:0.5px solid var(--color-border-secondary);border-radius:999px;background:var(--color-background-primary);color:var(--color-text-secondary);font-size:13px;cursor:pointer}
.filter-btn.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
</style>

<div class="wrap">
  <h2>家計簿</h2>

  <div class="cards">
    <div class="card">
      <div class="card-label">収入合計</div>
      <div class="card-value income" id="total-income">¥0</div>
    </div>
    <div class="card">
      <div class="card-label">支出合計</div>
      <div class="card-value expense" id="total-expense">¥0</div>
    </div>
    <div class="card">
      <div class="card-label">残高</div>
      <div class="card-value balance" id="total-balance">¥0</div>
    </div>
  </div>

  <div class="form-row">
    <input type="date" id="inp-date">
    <input type="text" id="inp-memo" placeholder="メモ（例：スーパー）" style="flex:2">
    <select id="inp-cat">
      <option value="食費">食費</option>
      <option value="交通費">交通費</option>
      <option value="光熱費">光熱費</option>
      <option value="娯楽">娯楽</option>
      <option value="医療">医療</option>
      <option value="給与">給与</option>
      <option value="その他">その他</option>
    </select>
    <input type="number" id="inp-amount" placeholder="金額" min="0" style="max-width:120px">
    <select id="inp-type">
      <option value="expense">支出</option>
      <option value="income">収入</option>
    </select>
    <button class="btn btn-add" onclick="addItem()">追加</button>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
    <button class="filter-btn" onclick="setFilter('income',this)">収入のみ</button>
    <button class="filter-btn" onclick="setFilter('expense',this)">支出のみ</button>
  </div>

  <div class="list-header">
    <span>日付</span><span>メモ・カテゴリ</span><span>種別</span><span style="text-align:right">金額</span><span></span>
  </div>
  <div id="list"></div>
</div>

<script>
let items = JSON.parse(localStorage.getItem('kakeibu')||'[]');
let filter = 'all';

const today = new Date().toISOString().split('T')[0];
document.getElementById('inp-date').value = today;

function save(){localStorage.setItem('kakeibu',JSON.stringify(items))}

function fmt(n){return '¥'+Number(n).toLocaleString('ja-JP')}

function addItem(){
  const date=document.getElementById('inp-date').value;
  const memo=document.getElementById('inp-memo').value.trim();
  const cat=document.getElementById('inp-cat').value;
  const amount=parseInt(document.getElementById('inp-amount').value);
  const type=document.getElementById('inp-type').value;
  if(!date||!amount||amount<=0){
    document.getElementById('inp-amount').style.boxShadow='0 0 0 2px #E24B4A';
    setTimeout(()=>document.getElementById('inp-amount').style.boxShadow='',1500);
    return;
  }
  items.unshift({id:Date.now(),date,memo:memo||cat,cat,amount,type});
  save();
  document.getElementById('inp-memo').value='';
  document.getElementById('inp-amount').value='';
  render();
}

function deleteItem(id){
  items=items.filter(i=>i.id!==id);
  save();render();
}

function setFilter(f,el){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render(){
  const filtered=filter==='all'?items:items.filter(i=>i.type===filter);
  const income=items.filter(i=>i.type==='income').reduce((s,i)=>s+i.amount,0);
  const expense=items.filter(i=>i.type==='expense').reduce((s,i)=>s+i.amount,0);
  const balance=income-expense;
  document.getElementById('total-income').textContent=fmt(income);
  document.getElementById('total-expense').textContent=fmt(expense);
  const balEl=document.getElementById('total-balance');
  balEl.textContent=fmt(balance);
  balEl.style.color=balance>=0?'#1D9E75':'#E24B4A';

  const list=document.getElementById('list');
  if(filtered.length===0){
    list.innerHTML='<div class="empty">データがありません。上のフォームから追加してください。</div>';
    return;
  }
  list.innerHTML=filtered.map(i=>`
    <div class="list-item">
      <span style="font-size:13px;color:var(--color-text-secondary)">${i.date}</span>
      <span><span style="font-size:13px">${i.memo}</span><span style="font-size:11px;color:var(--color-text-secondary);margin-left:6px">${i.cat}</span></span>
      <span><span class="badge ${i.type}">${i.type==='income'?'収入':'支出'}</span></span>
      <span class="amount ${i.type}" style="text-align:right">${fmt(i.amount)}</span>
      <button class="del-btn" onclick="deleteItem(${i.id})">✕</button>
    </div>
  `).join('');
}

render();
</script>
