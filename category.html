<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カテゴリ設定｜シンプル家計簿アプリ</title>
  <meta name="description" content="家計簿アプリのカテゴリを追加・編集・削除できます。">
  <style>
    :root{
      --color-text-primary:#222;
      --color-text-secondary:#666;
      --color-background-primary:#fff;
      --color-background-secondary:#f5f5f5;
      --color-border-secondary:#ddd;
      --color-border-tertiary:#eee;
      --color-green:#1D9E75;
      --border-radius-md:8px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
      color:var(--color-text-primary);
      background:var(--color-background-primary);
      font-size:15px;
      line-height:1.7;
    }
    header{border-bottom:0.5px solid var(--color-border-tertiary);padding:0 20px;}
    .header-inner{max-width:680px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:52px;}
    .logo{font-size:15px;font-weight:600;text-decoration:none;color:var(--color-text-primary);}
    nav{display:flex;gap:20px;}
    nav a{font-size:13px;color:var(--color-text-secondary);text-decoration:none;}
    nav a:hover{color:var(--color-text-primary);}
    .wrap{max-width:680px;margin:0 auto;padding:40px 20px 80px;}
    .page-title{font-size:22px;font-weight:600;margin-bottom:6px;}
    .page-desc{font-size:13px;color:var(--color-text-secondary);margin-bottom:20px;}
    .info-box{background:#E1F5EE;border-left:3px solid var(--color-green);border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:10px 14px;font-size:13px;color:#0F6E56;margin-bottom:20px;}
    .card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:16px;margin-bottom:16px;}
    .card-title{font-size:13px;font-weight:600;color:var(--color-text-secondary);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;}
    .form-row{display:flex;gap:8px;flex-wrap:wrap;}
    .form-row input{flex:1;min-width:180px;height:36px;padding:0 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;}
    .form-row input:focus{outline:none;box-shadow:0 0 0 2px var(--color-border-secondary);}
    .btn{height:36px;padding:0 16px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;cursor:pointer;white-space:nowrap;}
    .btn:hover{background:var(--color-background-secondary);}
    .btn-add{background:var(--color-green);color:#fff;border-color:var(--color-green);}
    .btn-add:hover{background:#0F6E56;border-color:#0F6E56;}
    .cat-list{display:flex;flex-direction:column;gap:8px;}
    .cat-item{display:flex;align-items:center;gap:8px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;}
    .cat-name{flex:1;font-size:14px;font-weight:500;}
    .cat-default{font-size:11px;color:var(--color-text-secondary);margin-left:6px;}
    .edit-input{flex:1;height:32px;padding:0 10px;border:0.5px solid var(--color-green);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;outline:none;display:none;}
    .btn-sm{height:30px;padding:0 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:12px;cursor:pointer;}
    .btn-sm:hover{background:var(--color-background-secondary);}
    .btn-edit{color:#3B82F6;border-color:#3B82F6;}
    .btn-edit:hover{background:#EFF6FF;}
    .btn-save{color:var(--color-green);border-color:var(--color-green);display:none;}
    .btn-save:hover{background:#E1F5EE;}
    .btn-cancel{color:var(--color-text-secondary);display:none;}
    .btn-del{color:#E24B4A;border-color:#E24B4A;}
    .btn-del:hover{background:#FEECEC;}
    .empty{text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:14px;}
    .warn-box{background:#FFF8E1;border-left:3px solid #F0A04B;border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:10px 14px;font-size:13px;color:#7a5000;margin-bottom:20px;display:none;}
    footer{border-top:0.5px solid var(--color-border-tertiary);padding:20px;text-align:center;}
    .footer-inner{max-width:680px;margin:0 auto;display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
    footer a{font-size:12px;color:var(--color-text-secondary);text-decoration:none;}
    footer a:hover{color:var(--color-text-primary);}
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="index.html">📒 シンプル家計簿</a>
    <nav>
      <a href="howto.html">使い方</a>
      <a href="about.html">about</a>
      <a href="privacy.html">プライバシー</a>
    </nav>
  </div>
</header>

<div class="wrap">
  <div class="page-title">カテゴリ設定</div>
  <div class="page-desc">収支の分類に使うカテゴリを追加・編集・削除できます。</div>

  <div class="info-box">
    💡 カテゴリを削除しても、すでに記録済みのデータは消えません。
  </div>

  <div class="warn-box" id="warn-box"></div>

  <div class="card">
    <div class="card-title">カテゴリを追加</div>
    <div class="form-row">
      <input type="text" id="inp-cat" placeholder="カテゴリ名を入力（例：美容）" onkeydown="if(event.key==='Enter')addCat()">
      <button class="btn btn-add" onclick="addCat()">追加</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">登録済みカテゴリ</div>
    <div id="cat-list"></div>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <a href="index.html">ホーム</a>
    <a href="fixedcost.html">固定費設定</a>
    <a href="category.html">カテゴリ設定</a>
    <a href="howto.html">使い方</a>
    <a href="about.html">このアプリについて</a>
    <a href="privacy.html">プライバシーポリシー</a>
  </div>
</footer>

<script>
const DEFAULT_CATS = ['食費','交通費','光熱費','娯楽','医療','給与','その他'];

// localStorageからカテゴリを取得。なければデフォルトを使用
let cats = JSON.parse(localStorage.getItem('kakeibo_cats') || 'null');
if(!cats){
  cats = DEFAULT_CATS.map(name => ({ id: Date.now() + Math.random(), name, isDefault: true }));
  saveCats();
}

function saveCats(){ localStorage.setItem('kakeibo_cats', JSON.stringify(cats)); }

function showWarn(msg){
  const el = document.getElementById('warn-box');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function addCat(){
  const inp = document.getElementById('inp-cat');
  const name = inp.value.trim();
  if(!name){ showWarn('カテゴリ名を入力してください。'); return; }
  if(cats.find(c => c.name === name)){ showWarn('同じ名前のカテゴリが既にあります。'); return; }
  cats.push({ id: Date.now(), name, isDefault: false });
  saveCats();
  inp.value = '';
  renderList();
}

function deleteCat(id){
  const cat = cats.find(c => c.id === id);
  if(!cat) return;
  if(!confirm(`「${cat.name}」を削除しますか？\n※記録済みのデータは消えません。`)) return;
  cats = cats.filter(c => c.id !== id);
  saveCats();
  renderList();
}

function startEdit(id){
  const item = document.querySelector(`.cat-item[data-id="${id}"]`);
  item.querySelector('.cat-name').style.display = 'none';
  item.querySelector('.edit-input').style.display = 'block';
  item.querySelector('.edit-input').focus();
  item.querySelector('.btn-edit').style.display = 'none';
  item.querySelector('.btn-save').style.display = 'inline-block';
  item.querySelector('.btn-cancel').style.display = 'inline-block';
  item.querySelector('.btn-del').style.display = 'none';
}

function saveEdit(id){
  const item = document.querySelector(`.cat-item[data-id="${id}"]`);
  const newName = item.querySelector('.edit-input').value.trim();
  if(!newName){ showWarn('カテゴリ名を入力してください。'); return; }
  if(cats.find(c => c.name === newName && c.id !== id)){ showWarn('同じ名前のカテゴリが既にあります。'); return; }
  const cat = cats.find(c => c.id === id);
  if(cat) cat.name = newName;
  saveCats();
  renderList();
}

function cancelEdit(id){
  renderList();
}

function renderList(){
  const el = document.getElementById('cat-list');
  if(cats.length === 0){
    el.innerHTML = '<div class="empty">カテゴリがありません。</div>';
    return;
  }
  el.innerHTML = cats.map(c => `
    <div class="cat-item" data-id="${c.id}">
      <span class="cat-name">
        ${c.name}
        ${c.isDefault ? '<span class="cat-default">デフォルト</span>' : ''}
      </span>
      <input class="edit-input" type="text" value="${c.name}">
      <button class="btn-sm btn-edit" onclick="startEdit(${c.id})">編集</button>
      <button class="btn-sm btn-save" onclick="saveEdit(${c.id})">保存</button>
      <button class="btn-sm btn-cancel" onclick="cancelEdit(${c.id})">キャンセル</button>
      <button class="btn-sm btn-del" onclick="deleteCat(${c.id})">削除</button>
    </div>
  `).join('');
}

renderList();
</script>
</body>
</html>
