<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カテゴリ設定｜シンプル家計簿アプリ</title>
  <meta name="description" content="家計簿アプリのカテゴリを追加・編集・削除できます。">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<button class="theme-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
<header>
  <div class="header-inner">
    <a class="logo" href="index.html">📒 シンプル家計簿</a>
    <nav>
      <a href="howto.html">使い方</a>
      <a href="about.html">about</a>
      <a href="privacy.html">プライバシー</a>
    </nav>
  </div>
</header>

<div class="wrap">
  <div class="page-title">カテゴリ設定</div>
  <div class="page-desc">収支の分類に使うカテゴリを追加・編集・削除できます。</div>
  <div class="info-box">💡 カテゴリを削除しても、すでに記録済みのデータは消えません。</div>
  <div class="warn-box" id="warn-box"></div>

  <div class="sub-card">
    <div class="card-title">カテゴリを追加</div>
    <div class="form-row">
      <input type="text" id="inp-cat" placeholder="カテゴリ名を入力（例：美容）" onkeydown="if(event.key==='Enter')addCat()">
      <button class="btn btn-add" onclick="addCat()">追加</button>
    </div>
  </div>

  <div class="sub-card">
    <div class="card-title">登録済みカテゴリ</div>
    <div id="cat-list"></div>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <a href="index.html">ホーム</a>
    <a href="fixedcost.html">固定費設定</a>
    <a href="category.html">カテゴリ設定</a>
    <a href="howto.html">使い方</a>
    <a href="about.html">このアプリについて</a>
    <a href="privacy.html">プライバシーポリシー</a>
  </div>
</footer>

<script>
function applyTheme(theme){
  const html=document.documentElement,btn=document.getElementById('theme-btn');
  html.classList.remove('dark','light');
  if(theme==='dark'){html.classList.add('dark');btn.textContent='☀️';}
  else if(theme==='light'){html.classList.add('light');btn.textContent='🌙';}
  else{btn.textContent=window.matchMedia('(prefers-color-scheme:dark)').matches?'☀️':'🌙';}
}
function toggleTheme(){
  const isDark=document.documentElement.classList.contains('dark')||
    (!document.documentElement.classList.contains('light')&&window.matchMedia('(prefers-color-scheme:dark)').matches);
  const next=isDark?'light':'dark';
  localStorage.setItem('theme',next);
  applyTheme(next);
}
applyTheme(localStorage.getItem('theme')||'auto');

const DEFAULT_CATS=['食費','交通費','光熱費','娯楽','医療','給与','その他'];
let cats=JSON.parse(localStorage.getItem('kakeibo_cats')||'null');
if(!cats){
  cats=DEFAULT_CATS.map(name=>({id:Date.now()+Math.random(),name,isDefault:true}));
  saveCats();
}
function saveCats(){localStorage.setItem('kakeibo_cats',JSON.stringify(cats));}

function showWarn(msg){
  const el=document.getElementById('warn-box');
  el.textContent='⚠️ '+msg;el.style.display='block';
  setTimeout(()=>{el.style.display='none';},3000);
}

function addCat(){
  const inp=document.getElementById('inp-cat');
  const name=inp.value.trim();
  if(!name){showWarn('カテゴリ名を入力してください。');return;}
  if(cats.find(c=>c.name===name)){showWarn('同じ名前のカテゴリが既にあります。');return;}
  cats.push({id:Date.now(),name,isDefault:false});
  saveCats();inp.value='';renderList();
}

function deleteCat(id){
  const cat=cats.find(c=>c.id===id);
  if(!cat)return;
  if(!confirm(`「${cat.name}」を削除しますか？\n※記録済みのデータは消えません。`))return;
  cats=cats.filter(c=>c.id!==id);
  saveCats();renderList();
}

function startEdit(id){
  const item=document.querySelector(`.cat-item[data-id="${id}"]`);
  item.querySelector('.cat-name').style.display='none';
  item.querySelector('.edit-input').style.display='block';
  item.querySelector('.edit-input').focus();
  item.querySelector('.btn-edit').style.display='none';
  item.querySelector('.btn-save').style.display='inline-block';
  item.querySelector('.btn-cancel').style.display='inline-block';
  item.querySelector('.btn-del').style.display='none';
}

function saveEdit(id){
  const item=document.querySelector(`.cat-item[data-id="${id}"]`);
  const newName=item.querySelector('.edit-input').value.trim();
  if(!newName){showWarn('カテゴリ名を入力してください。');return;}
  if(cats.find(c=>c.name===newName&&c.id!==id)){showWarn('同じ名前のカテゴリが既にあります。');return;}
  const cat=cats.find(c=>c.id===id);
  if(cat)cat.name=newName;
  saveCats();renderList();
}

function cancelEdit(){renderList();}

function renderList(){
  const el=document.getElementById('cat-list');
  if(cats.length===0){el.innerHTML='<div class="empty">カテゴリがありません。</div>';return;}
  el.innerHTML=cats.map(c=>`
    <div class="cat-item" data-id="${c.id}">
      <span class="cat-name">
        ${c.name}
        ${c.isDefault?'<span class="cat-default">デフォルト</span>':''}
      </span>
      <input class="edit-input" type="text" value="${c.name}">
      <button class="btn-sm btn-edit" onclick="startEdit(${c.id})">編集</button>
      <button class="btn-sm btn-save" onclick="saveEdit(${c.id})">保存</button>
      <button class="btn-sm btn-cancel" onclick="cancelEdit()">キャンセル</button>
      <button class="btn-sm btn-del" onclick="deleteCat(${c.id})">削除</button>
    </div>
  `).join('');
}

renderList();
</script>
</body>
</html>
